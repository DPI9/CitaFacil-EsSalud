# docker-compose de CitaFacil EsSalud (despliegue local/nube - Cap. 7 del informe)
# Levanta base de datos + backend + frontend con: docker compose up
#
# Nota sobre replicacion Maestro-Esclavo (Cap. 6.2): abajo se incluye un
# servicio 'db-replica' de ejemplo. En produccion se configuraria streaming
# replication de PostgreSQL (primary -> replica) para lecturas escalables.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: citafacil
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # 5433 en el host para no chocar con un PostgreSQL nativo en 5432
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citafacil"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/citafacil
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    # 80 para la nube (Allow HTTP) y 5173 por comodidad en local.
    # Nginx sirve la app y hace de reverse proxy a /api -> backend:8080
    ports:
      - "80:80"
      - "5173:80"

  # --- Ejemplo de replica de solo lectura (Maestro-Esclavo) ---
  # db-replica:
  #   image: postgres:17
  #   environment:
  #     POSTGRES_PASSWORD: postgres
  #   command: >
  #     bash -c "pg_basebackup -h db -U postgres -D /var/lib/postgresql/data -Fp -Xs -P -R && postgres"
  #   depends_on:
  #     - db

volumes:
  pgdata:
